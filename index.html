<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CLOUD</title>
    <style>
        /* TASARIM (CSS) - BORDO & CLOUD TEMASI */
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background-color: #0d0000; 
            color: #e0e0e0; 
            margin: 0; 
            padding: 20px; 
        }

        header { 
            background: linear-gradient(180deg, #1a0000 0%, #4a0000 100%);
            padding: 35px; 
            border-radius: 15px; 
            text-align: center; 
            border-bottom: 5px solid #800000; 
            margin-bottom: 25px;
            box-shadow: 0 10px 20px rgba(128,0,0,0.4);
        }

        h1 { 
            color: #ff3333; 
            text-transform: uppercase; 
            letter-spacing: 5px; 
            margin: 0;
            font-size: 40px;
            text-shadow: 3px 3px 10px rgba(0,0,0,0.8);
        }

        .slogan {
            color: #8b949e;
            font-style: italic;
            margin-top: 10px;
            letter-spacing: 1px;
            font-size: 16px;
        }

        .container { max-width: 900px; margin: auto; }

        .card { 
            background: #160000; 
            padding: 25px; 
            border-radius: 12px; 
            margin-bottom: 20px; 
            border: 1px solid #4a0000; 
            box-shadow: 0 8px 24px rgba(0,0,0,0.6); 
        }

        h3 { color: #cc0000; border-bottom: 1px solid #4a0000; padding-bottom: 10px; text-transform: uppercase; }

        input, textarea { 
            width: 96%; margin: 12px 0; padding: 14px; 
            background: #000000; color: white; border: 1px solid #660000; border-radius: 8px;
            font-size: 15px;
        }

        button { 
            width: 100%; padding: 14px; background: #800000; 
            border: none; border-radius: 8px; cursor: pointer; font-weight: bold; color: white;
            transition: 0.3s; text-transform: uppercase;
        }

        button:hover { background: #b30000; transform: translateY(-2px); box-shadow: 0 5px 15px rgba(179,0,0,0.4); }

        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th { background: #330000; color: #ff3333; padding: 15px; text-align: left; }
        td { padding: 15px; border-bottom: 1px solid #330000; }

        .role-text { font-weight: bold; color: #ff3333; text-transform: uppercase; }

        .post { background: #160000; border: 1px solid #4a0000; border-radius: 15px; margin-top: 25px; overflow: hidden; }
        .post-content { padding: 20px; }
        .post img { width: 100%; border-bottom: 1px solid #4a0000; }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>CLOUD OPERATÖR SAYFASI</h1>
            <div class="slogan">"Investigate the weather."</div>
            <p style="margin-top:20px;">Sistem Durumu: <b style="color:#ff3333">AKTİF</b></p>
        </header>

        <div class="card">
            <h3>Sisteme Kayıt</h3>
            <input type="text" id="regName" placeholder="Kullanıcı Adı...">
            <button onclick="kayitOl()">Veritabanına Ekle</button>
        </div>

        <div class="card">
            <h3>CLOUD Personel Listesi</h3>
            <table>
                <thead>
                    <tr>
                        <th>Kullanıcı</th>
                        <th>Yetki</th>
                        <th>İşlem</th>
                    </tr>
                </thead>
                <tbody id="user-list">
                    </tbody>
            </table>
        </div>

        <div class="card">
            <h3>Veri Paylaşımı</h3>
            <input type="text" id="imageUrl" placeholder="Resim URL (Kanıt)">
            <textarea id="caption" rows="3" placeholder="Gözlem notlarını buraya yaz..."></textarea>
            <button onclick="paylas()">Yayına Ver</button>
        </div>

        <div id="feed"></div>
    </div>

    <script>
        let users = [
            { id: 1, name: "Sistem_Admin", role: "Kurucu" }
        ];

        window.onload = listeyiGuncelle;

        function listeyiGuncelle() {
            const liste = document.getElementById('user-list');
            liste.innerHTML = "";
            users.forEach(user => {
                liste.innerHTML += `
                    <tr>
                        <td>${user.name}</td>
                        <td class="role-text">${user.role}</td>
                        <td>
                            <button style="width:auto; padding:5px 12px; font-size:12px; background:#4a0000;" onclick="yetkiVer(${user.id}, 'Operatör')">Yetkilendir</button>
                        </td>
                    </tr>
                `;
            });
        }

        function kayitOl() {
            const isim = document.getElementById('regName').value;
            if(isim.trim() === "") return alert("İsim gerekli!");
            users.push({ id: users.length + 1, name: isim, role: "Üye" });
            listeyiGuncelle();
            document.getElementById('regName').value = "";
            alert(isim + " sisteme dahil edildi.");
        }

        function yetkiVer(id, rol) {
            const user = users.find(u => u.id === id);
            if(user) {
                user.role = rol;
                listeyiGuncelle();
                alert(user.name + " yetkisi güncellendi: " + rol);
            }
        }

        function paylas() {
            const url = document.getElementById('imageUrl').value;
            const text = document.getElementById('caption').value;
            const feed = document.getElementById('feed');
            if(url === "") return alert("Görsel URL gerekli!");

            const post = document.createElement('div');
            post.className = 'post';
            post.innerHTML = `
                <img src="${url}" onerror="this.src='https://via.placeholder.com/600x300/1a0000/ff3333?text=VERI+YUKLENEMEDI'">
                <div class="post-content">
                    <p style="color:#ff3333; font-size:12px; margin-bottom:10px;">GÖZLEM RAPORU - CLOUD SYSTEM</p>
                    <p>${text}</p>
                </div>
            `;
            feed.prepend(post);
            document.getElementById('imageUrl').value = "";
            document.getElementById('caption').value = "";
        }
    </script>
</body>
</html>
